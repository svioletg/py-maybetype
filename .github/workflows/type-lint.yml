name: Lint and test

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read

jobs:
  build:
    name: Lint and test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.14' ]

    steps:
    - uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        architecture: x64
    - name: Install project + dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]
    - name: Check with ty
      run: |
        ty check .
    - name: Lint with ruff
      run: |
        ruff check .
